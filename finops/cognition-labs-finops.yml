description: >-
  FinOps view of Devin spend. Cognition meters all Devin usage - whether
  driven through the web app, IDE/CLI/Desktop clients, or the API - in Agent
  Compute Units (ACUs). ACUs accrue for the work Devin actually performs in a
  session (planning, context gathering, task execution, browser actions, code
  execution, VM time, and networking), not for time spent waiting on a human
  response, running test suites, or cloning a repository; Windows sessions run
  roughly 9% higher than equivalent Linux sessions, and idle sessions sleep
  (and stop accruing ACUs) after about 0.1 ACU of inactivity. Self-serve
  customers draw against a plan quota plus optional on-demand credits;
  Enterprise customers are billed directly in ACUs at a rate set in their
  order form and can cap consumption per organization.
notes: >-
  Cognition does not publish a flat USD-per-ACU rate; self-serve plan quotas
  and on-demand credit pricing are on the pricing page, and Enterprise ACU
  rates are negotiated per contract. Verify current numbers directly rather
  than assuming a fixed conversion.
