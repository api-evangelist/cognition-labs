meters:
- name: acu_consumption
  description: Agent Compute Units consumed by session work - planning, context gathering, task execution, browser actions, code execution, VM time, and networking.
  unit: acu
  aggregation: sum
  dimensions:
  - organization
  - session
  - user
- name: on_demand_credits
  description: Prepaid on-demand credits purchased by self-serve Pro/Max/Teams customers to fund usage beyond plan quota; roll over monthly, never expire once purchased.
  unit: acu
  aggregation: sum
  dimensions:
  - account
- name: enterprise_acu_spend
  description: Enterprise ACU consumption billed at the contracted order-form rate.
  unit: acu
  aggregation: sum
  dimensions:
  - enterprise
  - organization
- name: seat_subscription
  description: Flat monthly seat fees for Pro, Max, and Teams full seats.
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track ACU consumption per organization, session, and user via the v2/v3 consumption endpoints (daily consumption, session metrics, user daily consumption) to see where spend concentrates.
- name: Allocation
  description: Attribute sessions to individual users via create_as_user_id (v3) or requesting_user_email, and tag sessions, so ACU spend maps to teams and initiatives.
- name: Optimization
  description: Scope max_acu_limit on session creation to bound runaway tasks; rely on automatic sleep-on-inactivity; split large efforts across parallel sessions rather than one long-running session with idle gaps.
- name: Accountability
  description: Enterprise admins set per-organization ACU consumption caps so a single team cannot exceed its allocated budget; self-serve teams monitor shared on-demand credit burn across full and flex seats.
