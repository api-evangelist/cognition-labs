actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Cognition's public Devin API.
    All three documented API generations (v1, v2, v3) are REST over HTTPS,
    and session progress is observed via polling rather than any push
    transport. No AsyncAPI document was created because there is no
    documented server-push surface on the public API to model; the
    gRPC/WebSockets bridge mentioned for the Devin Desktop client is
    internal, undocumented, and unrelated to the public API reference.
