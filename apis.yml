- aid: cognition-labs:devin-playbooks-api
  name: Devin Playbooks API
  tags:
  - Playbooks
  - Workflows
  - Automation
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.devin.ai/api-reference/v1/playbooks/list-playbooks
  baseURL: https://api.devin.ai/v1
  properties:
  - url: https://docs.devin.ai/api-reference/v1/playbooks/list-playbooks
    type: APIReference
  - url: https://docs.devin.ai/api-reference/v1/playbooks/create-playbook
    type: APIReference
  - url: openapi/cognition-labs-openapi.yml
    type: OpenAPI
  description: Create, retrieve, list, update, and delete team playbooks - reusable,
    named instruction sets that seed new Devin sessions via a playbook_id so
    recurring tasks run the same way every time.
- aid: cognition-labs:devin-secrets-api
  name: Devin Secrets API
  tags:
  - Secrets
  - Credentials
  - Security
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.devin.ai/api-reference/v1/secrets/list-secrets
  baseURL: https://api.devin.ai/v1
  properties:
  - url: https://docs.devin.ai/api-reference/v1/secrets/list-secrets
    type: APIReference
  - url: https://docs.devin.ai/api-reference/v1/secrets/create-secret
    type: APIReference
  - url: https://docs.devin.ai/admin/security
    type: Documentation
  - url: openapi/cognition-labs-openapi.yml
    type: OpenAPI
  description: Create, list, and delete organization secrets (cookie, key-value,
    dictionary, or TOTP types) that Devin can use inside sessions without exposing
    values back over the API; list responses return metadata only. Org-level
    secrets are also managed on the v3 surface.
- aid: cognition-labs:devin-organizations-api
  name: Devin Organizations API
  tags:
  - Organizations
  - Users
  - RBAC
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.devin.ai/api-reference/v3/overview
  baseURL: https://api.devin.ai/v3
  properties:
  - url: https://docs.devin.ai/api-reference/v3/overview
    type: Documentation
  - url: https://docs.devin.ai/api-reference/getting-started/teams-quickstart
    type: Documentation
  - url: https://docs.devin.ai/api-reference/v3/users/members-users
    type: APIReference
  - url: openapi/cognition-labs-openapi.yml
    type: OpenAPI
  description: Current (v3) organization-scoped surface at /v3/organizations/{org_id} -
    create and manage sessions with optional user attribution, list/invite/delete
    organization users, and reach the same knowledge, playbooks, and secrets
    resources under RBAC with service-user (cog_) or personal access tokens.
- aid: cognition-labs:devin-enterprise-api
  name: Devin Enterprise API
  tags:
