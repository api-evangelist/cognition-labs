  baseURL: https://api.devin.ai/v3
  properties:
  - url: https://docs.devin.ai/admin/billing/usage
    type: Documentation
  - url: https://docs.devin.ai/admin/billing/enterprise
    type: Documentation
  - url: https://docs.devin.ai/api-reference/v3/consumption/consumption-daily
    type: APIReference
  - url: openapi/cognition-labs-openapi.yml
    type: OpenAPI
  description: Read enterprise- and session-level Agent Compute Unit (ACU)
    consumption - daily totals across an enterprise, per-organization and
    per-user daily consumption, and per-session usage/insights metrics -
    for chargeback, budgeting, and enforcing per-organization consumption caps.
