  humanURL: https://docs.devin.ai/api-reference/getting-started/enterprise-quickstart
  baseURL: https://api.devin.ai/v3
  properties:
  - url: https://docs.devin.ai/api-reference/getting-started/enterprise-quickstart
    type: Documentation
  - url: https://docs.devin.ai/api-reference/v2/organizations/list-organizations
    type: APIReference
  - url: https://docs.devin.ai/api-reference/v2/api-keys/list-enterprise-api-keys
    type: APIReference
  - url: openapi/cognition-labs-openapi.yml
