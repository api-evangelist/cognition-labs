aid: cognition-labs
url: https://raw.githubusercontent.com/api-evangelist/cognition-labs/refs/heads/main/apis.yml
name: Cognition Labs
kind: company
description: Cognition Labs is the applied AI lab behind Devin, the autonomous AI
  software engineer that plans, writes, tests, and ships code inside its own shell,
  code editor, and browser. The Devin API lets teams create and drive Devin sessions
  programmatically - sending prompts and follow-up messages, attaching files, storing
  organizational knowledge and reusable playbooks, injecting secrets, and tracking
  Agent Compute Unit (ACU) consumption - across a legacy v1 surface, a v2 enterprise
  surface, and a current v3 organizations/enterprise surface built around service-user
  and personal access tokens.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- AI
- AI Agent
- Autonomous Coding
- Software Engineering
- LLM
- Devin
created: '2026-07-02'
modified: '2026-07-02'
specificationVersion: '0.19'
apis:
- aid: cognition-labs:devin-sessions-api
  name: Devin Sessions API
  tags:
  - Sessions
  - Agent
  - Tasks
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.devin.ai/api-reference/v1/sessions/create-a-new-devin-session
  baseURL: https://api.devin.ai/v1
  properties:
  - url: https://docs.devin.ai/api-reference/overview
    type: Documentation
  - url: https://docs.devin.ai/api-reference/v1/sessions/create-a-new-devin-session
    type: APIReference
  - url: openapi/cognition-labs-openapi.yml
    type: OpenAPI
  - url: collections/cognition-labs.postman_collection.json
    type: Postman
  - url: collections/cognition-labs.opencollection.json
    type: OpenCollection
  description: Create a Devin session with a natural-language prompt and optional
    playbook, snapshot, knowledge, secrets, tags, and a max ACU cap; list sessions
    with filters; retrieve full session status and structured output; update tags;
    and terminate a running session.
- aid: cognition-labs:devin-messages-api
  name: Devin Messages API
  tags:
  - Messages
  - Sessions
  - Conversational
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.devin.ai/api-reference/v1/sessions/send-a-message-to-an-existing-devin-session
  baseURL: https://api.devin.ai/v1
  properties:
  - url: https://docs.devin.ai/api-reference/v1/sessions/send-a-message-to-an-existing-devin-session
    type: APIReference
  - url: https://docs.devin.ai/api-reference/v3/sessions/post-organizations-sessions-messages
    type: APIReference
  - url: openapi/cognition-labs-openapi.yml
    type: OpenAPI
  description: Send follow-up messages into a running Devin session to steer, correct,
    or add context to its work, and list the message history of a session. The
    session must be in a running state to receive a message; sending a message
    also wakes a sleeping session.
- aid: cognition-labs:devin-attachments-api
  name: Devin Attachments API
  tags:
  - Attachments
  - Files
  - Uploads
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.devin.ai/api-reference/v1/attachments/upload-files-for-devin-to-work-with
  baseURL: https://api.devin.ai/v1
  properties:
  - url: https://docs.devin.ai/api-reference/v1/attachments/upload-files-for-devin-to-work-with
    type: APIReference
  - url: https://docs.devin.ai/api-reference/v1/attachments/download-attachment-files
    type: APIReference
  - url: openapi/cognition-labs-openapi.yml
    type: OpenAPI
  description: Upload files (multipart/form-data) for Devin to work with, receiving
    back a file URL that is referenced in a session prompt as ATTACHMENT:"{file_url}",
    and download attachment files by ID.
- aid: cognition-labs:devin-knowledge-api
  name: Devin Knowledge API
  tags:
