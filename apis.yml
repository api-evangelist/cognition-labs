  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.devin.ai/api-reference/v1/knowledge/list-knowledge
  baseURL: https://api.devin.ai/v1
  properties:
  - url: https://docs.devin.ai/api-reference/v1/knowledge/list-knowledge
    type: APIReference
  - url: https://docs.devin.ai/api-reference/v1/knowledge/create-knowledge
    type: APIReference
  - url: openapi/cognition-labs-openapi.yml
    type: OpenAPI
  description: Create, list, update, and delete organization-level knowledge entries
    and folders - persistent notes with a trigger description that Devin
    automatically pulls into relevant sessions - plus enterprise-level knowledge
